<div class="home-page">
  <div class="flex flex-col items-center m-12 gap-2">
    <h1 class="title text-4xl text-center font-extrabold">Welcome to Furijat</h1>
    <h2 class="subtitle text-2xl text-center text-gray-600">Community fundraising platform to enable people achieve their dreams</h2>
  </div>


  <section class="blog-section">
    <h2 class="blog-title text-black text-3xl font-bold">BLOG</h2>
    <div *ngIf="!isLoading && articles?.length === 0" class="flex justify-center items-center m-12">
      <p class="text-gray-400 text-xl font-semibold">No blog articles yet</p>
    </div>

    <div *ngIf="articles?.length > 0" class="flex flex-col items-center m-12 lg:grid lg:grid-cols-3 place-items-center gap-8">
      <a routerLink="/blog/{{article.id}}" class="article-card" *ngFor="let article of articles">
        <img class="h-[300px] " src="{{webEnvironment.backendurl}}/storage/blog/{{article.id}}/Images/cover"
          appFallbackimage />
        <p class="text-black mt-2 mb-2 ml-4 mr-4">{{article.published}}</p>
        <h2 class="text-black text-2xl mt-1 mb-4 ml-4 mr-4">{{article.title}}</h2>
      </a>
    </div>
  </section>
</div>
